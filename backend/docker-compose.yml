services:
  intex-api:
    image: python:3.11-slim  # 
    container_name: intex-api
    ports:
      - "5446:8080"
    working_dir: /app
    command: bash -c "pip install -r requirements.txt && apt-get update && apt-get install -y supervisor && supervisord -c /app/supervisord.conf"
    volumes:
      - .:/app  # Map the local repository (where docker-compose.yml is located) to /app in the container
      - ../data/migrations:/data/migrations:ro
      - ../tests:/tests
    environment:
      - MIGRATIONS_DIR=/data/migrations
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - INTEX_ENDPOINT_USER=${INTEX_ENDPOINT_USER}
      - INTEX_ENDPOINT_PASSWORD=${INTEX_ENDPOINT_PASSWORD}
      - INTEX_BASE_URL=${INTEX_BASE_URL}
      - LLM_PROVIDER=${LLM_PROVIDER:-OPENAI}
      - OPENAI_APIKEY=${OPENAI_APIKEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - GEMINI_APIKEY=${GEMINI_APIKEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - PYTHONUNBUFFERED=1
    networks:
      - intex_network
networks:
  intex_network:
    external: true