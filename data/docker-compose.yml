services:
  timescaledb-intex:
    image: timescale/timescaledb-ha:pg16
    ports:
      - "5444:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  # Use environment variable from the shell (.env POSTGRES_PASSWORD=Z12asDfj9EEqT3b)
      - PGDATA=/custom/data/pgdata
    volumes:
      - ./data:/custom/data/pgdata
      - ./migrations/create-tables.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./migrations/create-users.sql:/docker-entrypoint-initdb.d/02-users.sql:ro
    restart: always
    user: "0:0"
    networks:
      - intex_network

  pgadmin-intex:
    image: dpage/pgadmin4:latest
    ports:
      - "5445:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@intex.com
      - PGADMIN_DEFAULT_PASSWORD=IAAadmin123PL
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - timescaledb
    restart: always
    networks:
      - intex_network

volumes:
  pgadmin_data:

networks:
  intex_network:
    name: intex_network
    driver: bridge

